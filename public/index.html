<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROM Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🎮 ROM Manager</h1>
    <div id="stats-bar">Carregando...</div>
</header>

<main>
    <div class="acoes">
        <div class="pasta-box">
            <input id="input-caminho" class="input-pasta"
                   placeholder="Cole o caminho da pasta — ex: C:\ROMs ou D:\Jogos\GBA">
            <button onclick="confirmarPasta()" class="btn verde">
                📁 Confirmar Pasta
            </button>
        </div>
        <button id="btn-escanear" onclick="escanear()" class="btn azul" disabled>
            🔍 Escanear ROMs
        </button>
        <button onclick="verificar()" class="btn roxo">
            ✅ Verificar Integridade
        </button>
<button onclick="buscarMetaTodos()" class="btn amarelo">
    🔄 Buscar Info em Todos
</button>
    </div>

    <div id="pasta-confirmada" class="pasta-caminho oculto"></div>
    <div id="mensagem" class="mensagem oculto"></div>

    <div class="filtros">
        <input id="busca-nome" placeholder="Buscar por nome..." oninput="buscar()">
        <select id="busca-plataforma" onchange="buscar()">
            <option value="">Todas as plataformas</option>
            <option value="GBA">GBA</option>
            <option value="GameBoy">GameBoy</option>
            <option value="GameBoy Color">GameBoy Color</option>
            <option value="NES">NES</option>
            <option value="SNES">SNES</option>
            <option value="N64">N64</option>
            <option value="Nintendo DS">Nintendo DS</option>
            <option value="3DS">3DS</option>
            <option value="PS1">PS1</option>
            <option value="PS2">PS2</option>
        </select>
        <select id="busca-regiao" onchange="buscar()">
            <option value="">Todas as regiões</option>
            <option value="USA">USA</option>
            <option value="EUR">EUR</option>
            <option value="JPN">JPN</option>
            <option value="BRA">BRA</option>
            <option value="World">World</option>
        </select>
        <button onclick="limparFiltros()" class="btn cinza">✖ Limpar</button>
    </div>

    <div id="contagem"></div>

    <div id="tabela-roms">
        <thead>
            <tr>
                <th>#</th>
                <th>Nome</th>
                <th>Plataforma</th>
                <th>Região</th>
                <th>Tamanho</th>
                <th>Ação</th>
            </tr>
        </thead>
        <tbody id="tabela-roms">
            <tr>
                <td colspan="6" class="centro">
                    Informe uma pasta e clique em "Escanear ROMs"
                </td>
            </tr>
        </tbody>
    </div>
</main>

<script src="app.js"></script>
</body>
</html>
